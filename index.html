<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Económico · Argentina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24; --border: #1e2430;
    --accent: #00e5a0; --accent2: #ff6b35; --accent3: #4d9fff; --accent4: #ffcc00;
    --text: #e8eaf0; --text-dim: #7a8499; --text-muted: #3d4558;
  }
  body { background: var(--bg); color: var(--text); font-family: 'IBM+Plex+Sans', sans-serif; margin: 0; padding: 20px; }
  h1, h2 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
  .kpi-val { font-family: 'IBM+Plex+Mono', monospace; font-size: 24px; color: var(--accent); margin-top: 10px; }
  .kpi-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
  .chart-container { height: 300px; width: 100%; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  th { text-align: left; color: var(--text-dim); border-bottom: 1px solid var(--border); padding: 8px; }
  td { padding: 8px; border-bottom: 1px solid var(--border); }
  .loading-val { color: var(--text-muted); font-style: italic; }
</style>
</head>
<body>

<h1>Dashboard Económico Argentina</h1>

<div class="grid">
  <div class="card" style="grid-column: span 2;">
    <h2>EMAE - Evolución y Proyección 2026</h2>
    <div class="chart-container">
      <canvas id="chartEMAE"></canvas>
    </div>
  </div>

  <div class="card">
    <h2>Variables Monetarias (BCRA)</h2>
    <div style="margin-top:15px;">
      <div class="kpi-label">Reservas Internacionales</div>
      <div id="mon-reservas" class="kpi-val loading-val">Cargando...</div>
      <br>
      <div class="kpi-label">Tipo de Cambio Ref (BNA)</div>
      <div id="mon-usd" class="kpi-val loading-val" style="color:var(--accent3)">Cargando...</div>
    </div>
  </div>

  <div class="card">
    <h2>Riesgo y Morosidad</h2>
    <div style="margin-top:15px;">
      <div class="kpi-label">Irregularidad Cartera Privada</div>
      <div id="mon-mora" class="kpi-val loading-val" style="color:var(--accent2)">Cargando...</div>
      <p style="font-size: 11px; color:var(--text-muted); margin-top:10px;">
        Indicador de mora del sistema financiero consolidado.
      </p>
    </div>
  </div>
</div>

<script>
// 1. CONFIGURACIÓN GLOBAL
const BCRA_TOKEN = 'eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE4MDk4MTMzMDUsInR5cGUiOiJleHRlcm5hbCIsInVzZXIiOiJtYXJ0aW4udmFzc2FsbG8yQGdtYWlsLmNvbSJ9.I37TnpHkNtKGk4Hlu0ZaMIKzzKlqdrLHKisL-lGDP0zScF_u58MWje0SYrwZJbxFA1AiUCMwtM-Mh837X5BbQA'; // <--- Pegá TODO el código ahí adentro
const API_BASE = 'https://api.estadisticasbcra.com';

const FALLBACK_DATA = {
    'reservas': '29.850 M',
    'usd': '915.50',
    'mora': '2.1%'
};

function chartOpts() {
    return {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            y: { grid: { color: '#1e2430' }, ticks: { color: '#7a8499' } },
            x: { grid: { display: false }, ticks: { color: '#7a8499' } }
        },
        plugins: { legend: { display: false } }
    };
}

// 2. LÓGICA DE ACTIVIDAD (EMAE CORREGIDO)
(function initEMAE() {
    const labels = ['Ene 24','Mar 24','May 24','Jul 24','Sep 24','Nov 24','Ene 25','Mar 25','May 25','Jul 25','Sep 25','Nov 25','Ene 26','Mar 26(p)','Abr 26(p)','May 26(p)','Jun 26(p)','Jul 26(p)','Ago 26(p)','Sep 26(p)','Oct 26(p)','Nov 26(p)','Dic 26(p)'];
    const valsOficial = [164.2, 161.8, 163.5, 166.1, 168.4, 167.2, 169.8, 172.1, 174.3, 175.8, 177.2, 178.1, 179.3];
    
    const dataOficialFinal = [...valsOficial, ...new Array(labels.length - valsOficial.length).fill(null)];
    const dataProyFinal = new Array(12).fill(null);
    // Empalma en Ene 26 (179.3) y sigue
    dataProyFinal.push(179.3, 180.8, 182.1, 183.5, 184.9, 186.2, 187.4, 188.7, 189.9, 191.1, 192.3);

    new Chart(document.getElementById('chartEMAE'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Oficial', data: dataOficialFinal, borderColor: '#00e5a0', backgroundColor: 'rgba(0,229,160,0.1)', fill: true, tension: 0.4 },
                { label: 'Proyección', data: dataProyFinal, borderColor: '#ffcc00', borderDash: [6,4], pointRadius: 0, fill: false, tension: 0.4 }
            ]
        },
        options: chartOpts()
    });
})();

// 3. LÓGICA DE DATOS BCRA
async function fetchData(endpoint) {
    if (BCRA_TOKEN === 'TU_TOKEN_AQUÍ') return null;
    try {
        const response = await fetch(`${API_BASE}/${endpoint}`, {
            headers: { 'Authorization': `Bearer ${BCRA_TOKEN}` }
        });
        return response.ok ? await response.json() : null;
    } catch (e) { return null; }
}

async function updateKPIs() {
    const map = {
        'reservas': 'reservas',
        'usd': 'usd',
        'mora': 'prestamos_privados'
    };

    for (let key in map) {
        const el = document.getElementById(`mon-${key}`);
        const data = await fetchData(map[key]);
        
        if (data && data.length > 0) {
            const last = data[data.length - 1].value;
            el.textContent = key === 'reservas' ? (last/1000).toFixed(3) + ' M' : last.toLocaleString('es-AR');
        } else {
            el.textContent = FALLBACK_DATA[key];
            el.style.color = 'var(--text-dim)';
        }
        el.classList.remove('loading-val');
    }
}

// INICIO
updateKPIs();
</script>
</body>
</html>
